ai:
    - changed-files:
          - any-glob-to-any-file:
                - '.agents/**'
                - 'AGENTS.md'
                - 'CLAUDE.md'

ci:
    - changed-files:
          - any-glob-to-any-file:
                - '.github/**'
                - 'ci/**'
                - 'scripts/**'

dependencies:
    - changed-files:
          - any-glob-to-any-file:
                - 'package.json'
                - 'package-lock.json'

documentation:
    - changed-files:
          - any-glob-to-any-file:
                - 'docs/**'

rules:
    - changed-files:
          - any-glob-to-any-file:
                - 'rules/**'
                - 'tests/**/*.spec.ts'

tests:
    - changed-files:
          - any-glob-to-any-file:
                - 'playwright/**'
                - 'web-test-runner.config.mjs'
