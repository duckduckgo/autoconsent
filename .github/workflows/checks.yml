name: Validate

on: [push, pull_request]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'

            - run: npm ci

            - run: npm run lint

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'
            - run: npm ci
            - run: npx playwright install chromium
            - run: npm run prepublish
            - run: npm run test:lib
            - run: npm run test:webext
