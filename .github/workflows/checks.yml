name: Validate

on: [push, pull_request]

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'

            - run: npm ci
            - run: npm run lint-fix

            - name: Commit and push lint fixes (only PRs from the same repo)
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  git diff --quiet && exit 0
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "chore: auto-fix lint errors"
                  git push

            - name: Fail if lint fixes are needed (non-PR push events)
              if: github.event_name != 'pull_request'
              run: |
                  if ! git diff --quiet; then
                      echo "Lint/formatting errors found. Please run 'npm run lint-fix' locally and commit the changes."
                      exit 1
                  fi

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'
            - run: npm ci
            - run: npm run test:lib
