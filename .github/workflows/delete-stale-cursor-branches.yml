name: Delete stale cursor branches

# Deletes `cursor/*` branches whose tip commit has not been touched for a
# configurable number of days. Branches with an open pull request are
# always skipped.

on:
    schedule:
        # Every Monday at 06:00 UTC.
        - cron: '0 6 * * 1'
    workflow_dispatch:
        inputs:
            stale_days:
                description: 'Branches with no commits in this many days are considered stale.'
                required: false
                default: '30'
                type: string
            dry_run:
                description: 'If true, only log what would be deleted without making changes.'
                required: false
                default: 'true'
                type: choice
                options:
                    - 'true'
                    - 'false'

permissions:
    contents: write
    pull-requests: read

concurrency:
    group: delete-stale-cursor-branches
    cancel-in-progress: false

jobs:
    delete:
        name: Delete stale cursor/* branches
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              env:
                  STALE_DAYS: ${{ inputs.stale_days || '30' }}
                  DRY_RUN: ${{ inputs.dry_run || 'false' }}
              with:
                  script: |
                      const staleDays = parseInt(process.env.STALE_DAYS, 10);
                      const dryRun = process.env.DRY_RUN === 'true';
                      const cutoff = Date.now() - staleDays * 24 * 60 * 60 * 1000;

                      core.info(`Stale threshold: ${staleDays} days (cutoff ${new Date(cutoff).toISOString()})`);
                      core.info(`Dry run: ${dryRun}`);

                      const branches = await github.paginate(github.rest.repos.listBranches, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          per_page: 100,
                      });
                      const cursorBranches = branches.filter((b) => b.name.startsWith('cursor/'));
                      core.info(`Found ${cursorBranches.length} cursor/* branches.`);

                      const openPRs = await github.paginate(github.rest.pulls.list, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          per_page: 100,
                      });
                      const openPRHeads = new Set(openPRs.map((pr) => pr.head.ref));

                      const deleted = [];
                      const skipped = [];

                      for (const branch of cursorBranches) {
                          const { name, commit } = branch;

                          if (openPRHeads.has(name)) {
                              skipped.push({ name, reason: 'open PR' });
                              continue;
                          }

                          const { data: commitData } = await github.rest.repos.getCommit({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              ref: commit.sha,
                          });
                          const committedAt = new Date(
                              commitData.commit.committer?.date || commitData.commit.author?.date,
                          ).getTime();

                          if (committedAt > cutoff) {
                              skipped.push({ name, reason: `recent (${new Date(committedAt).toISOString()})` });
                              continue;
                          }

                          if (dryRun) {
                              core.info(`[dry-run] would delete ${name}@${commit.sha.slice(0, 7)}`);
                              deleted.push({ name, sha: commit.sha, dryRun: true });
                              continue;
                          }

                          try {
                              await github.rest.git.deleteRef({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  ref: `heads/${name}`,
                              });
                              deleted.push({ name, sha: commit.sha });
                              core.info(`Deleted ${name}@${commit.sha.slice(0, 7)}.`);
                          } catch (err) {
                              core.error(`Failed to delete ${name}: ${err.message}`);
                              skipped.push({ name, reason: `delete failed: ${err.message}` });
                          }
                      }

                      const summary = core.summary
                          .addHeading('Delete stale cursor/* branches')
                          .addRaw(`Stale threshold: **${staleDays} days**`).addEOL()
                          .addRaw(`Dry run: **${dryRun}**`).addEOL();

                      if (deleted.length > 0) {
                          summary.addHeading(`${dryRun ? 'Would delete' : 'Deleted'} (${deleted.length})`, 2);
                          summary.addTable([
                              [
                                  { data: 'Branch', header: true },
                                  { data: 'SHA', header: true },
                              ],
                              ...deleted.map((d) => [d.name, d.sha.slice(0, 7)]),
                          ]);
                      } else {
                          summary.addRaw('No stale branches to delete.').addEOL();
                      }

                      if (skipped.length > 0) {
                          summary.addHeading(`Skipped (${skipped.length})`, 2);
                          summary.addTable([
                              [
                                  { data: 'Branch', header: true },
                                  { data: 'Reason', header: true },
                              ],
                              ...skipped.map((s) => [s.name, s.reason]),
                          ]);
                      }

                      await summary.write();
