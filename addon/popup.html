<!doctype html>
<html>
    <head>
        <style>
            html {
                min-height: 10em;
                min-width: 20em;
            }

            #proceed {
                width: 100%;
                height: 3em;
                margin: 1em auto;
                cursor: pointer;
                border-radius: 3px;
            }

            #reload,
            #reset {
                width: 100%;
                height: 2em;
                margin: 0.5em auto;
                cursor: pointer;
                border-radius: 2px;
            }

            .rule-section {
                margin: 0.5em 0;
            }

            .rule-search {
                box-sizing: border-box;
                margin: 0.5em 0;
                width: 100%;
            }

            .rule-actions {
                display: flex;
                gap: 0.5em;
                margin: 0.5em 0;
            }

            .rule-actions button {
                flex: 1;
            }

            .rule-list {
                border: 1px solid #ddd;
                max-height: 12em;
                overflow-y: auto;
                padding: 0.25em;
            }

            .rule-row {
                display: block;
                overflow: hidden;
                padding: 0.15em 0;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .rule-list-status {
                color: #666;
                font-size: 0.9em;
                margin: 0.25em 0;
            }

            .rule-count-disabled {
                color: #b00020;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <fieldset>
            <div>
                <input type="checkbox" id="enabled" name="enabled" checked />
                <label for="enabled">Enable on <span id="current-site"></span></label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Select autoconsent mode:</legend>

            <div>
                <input type="radio" id="optout" name="mode" value="optOut" checked />
                <label for="optout">Reject cookies when possible</label>
            </div>

            <div>
                <input type="radio" id="optin" name="mode" value="optIn" />
                <label for="optin">Accept all cookies</label>
            </div>

            <div>
                <input type="radio" id="prompt" name="mode" value="null" />
                <label for="prompt">Prompt every time</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Hide popups during operation</legend>

            <div>
                <input type="radio" id="prehide-on" name="prehide" value="true" checked />
                <label for="prehide-on">On</label>
            </div>

            <div>
                <input type="radio" id="prehide-off" name="prehide" value="false" />
                <label for="prehide-off">Off</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Apply cosmetic rules</legend>

            <div>
                <input type="radio" id="cosmetic-on" name="cosmetic" value="true" checked />
                <label for="cosmetic-on">On</label>
            </div>

            <div>
                <input type="radio" id="cosmetic-off" name="cosmetic" value="false" />
                <label for="cosmetic-off">Off</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Apply generated rules</legend>

            <div>
                <input type="radio" id="generated-on" name="generated" value="true" checked />
                <label for="generated-on">On</label>
            </div>

            <div>
                <input type="radio" id="generated-off" name="generated" value="false" />
                <label for="generated-off">Off</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Rules</legend>

            <details class="rule-section" id="generated-rules-section">
                <summary>Generated rules <span id="generated-rules-count"></span></summary>
                <input class="rule-search" type="search" id="generated-rules-search" placeholder="Search generated rules" />
                <div class="rule-actions">
                    <button id="generated-rules-enable-all">Enable all</button>
                    <button id="generated-rules-disable-all">Disable all</button>
                </div>
                <div class="rule-list-status" id="generated-rules-status"></div>
                <div class="rule-list" id="generated-rules-list"></div>
            </details>

            <details class="rule-section" id="generic-rules-section">
                <summary>Generic rules <span id="generic-rules-count"></span></summary>
                <input class="rule-search" type="search" id="generic-rules-search" placeholder="Search generic rules" />
                <div class="rule-actions">
                    <button id="generic-rules-enable-all">Enable all</button>
                    <button id="generic-rules-disable-all">Disable all</button>
                </div>
                <div class="rule-list-status" id="generic-rules-status"></div>
                <div class="rule-list" id="generic-rules-list"></div>
            </details>

            <details class="rule-section" id="code-rules-section">
                <summary>Code-based rules <span id="code-rules-count"></span></summary>
                <input class="rule-search" type="search" id="code-rules-search" placeholder="Search code-based rules" />
                <div class="rule-actions">
                    <button id="code-rules-enable-all">Enable all</button>
                    <button id="code-rules-disable-all">Disable all</button>
                </div>
                <div class="rule-list-status" id="code-rules-status"></div>
                <div class="rule-list" id="code-rules-list"></div>
            </details>
        </fieldset>

        <fieldset>
            <legend>Handle unknown popups (heuristic rule)</legend>

            <div>
                <input type="radio" id="heuristic-off" name="heuristic-mode" value="off" checked />
                <label for="heuristic-off">Off</label>
            </div>

            <div>
                <input type="radio" id="heuristic-reject" name="heuristic-mode" value="reject" />
                <label for="heuristic-reject">Reject when possible</label>
            </div>

            <div>
                <input type="radio" id="heuristic-tier1" name="heuristic-mode" value="tier1" />
                <label for="heuristic-tier1">Acknowledge if no reject (tier 1)</label>
            </div>

            <div>
                <input type="radio" id="heuristic-tier2" name="heuristic-mode" value="tier2" />
                <label for="heuristic-tier2">Accept if no reject or acknowledge (tier 2)</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Highlight clicks</legend>

            <div>
                <input type="radio" id="visual-test-on" name="visual-test" value="true" checked />
                <label for="visual-test-on">On</label>
            </div>

            <div>
                <input type="radio" id="visual-test-off" name="visual-test" value="false" />
                <label for="visual-test-off">Off</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Popup mutation observer</legend>

            <div>
                <input type="radio" id="popup-mutation-on" name="popup-mutation" value="true" />
                <label for="popup-mutation-on">On</label>
            </div>

            <div>
                <input type="radio" id="popup-mutation-off" name="popup-mutation" value="false" checked />
                <label for="popup-mutation-off">Off</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Debug logging</legend>
            <div>
                <input type="checkbox" id="logs-lifecycle" name="logs-lifecycle" checked />
                <label for="logs-lifecycle">Lifecycle</label>
            </div>
            <div>
                <input type="checkbox" id="logs-rulesteps" name="logs-rulesteps" checked />
                <label for="logs-rulesteps">Rule steps</label>
            </div>
            <div>
                <input type="checkbox" id="logs-detectionsteps" name="logs-detectionsteps" checked />
                <label for="logs-detectionsteps">Include detection steps</label>
            </div>
            <div>
                <input type="checkbox" id="logs-waits" name="logs-waits" checked />
                <label for="logs-waits">Include wait steps</label>
            </div>
            <div>
                <input type="checkbox" id="logs-evals" name="logs-evals" checked />
                <label for="logs-evals">Evals</label>
            </div>
            <div>
                <input type="checkbox" id="logs-errors" name="logs-errors" checked />
                <label for="logs-errors">Errors</label>
            </div>
            <div>
                <input type="checkbox" id="logs-messages" name="logs-messages" checked />
                <label for="logs-messages">Internal messages</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Other</legend>
            <div>
                <input type="number" id="retries" name="retries" value="20" />
                <label for="retries">Detection attempts</label>
            </div>
            <button id="reload">Reload rules</button>
            <button id="reset">Reset settings</button>
        </fieldset>
        <script src="popup.bundle.js"></script>
    </body>
</html>
